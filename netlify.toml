[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["pdf-parse", "pdfjs-dist"]

[functions."generate-quiz"]
  timeout = 26

[functions."verify-quiz"]
  timeout = 26

[functions."evaluate-answer"]
  timeout = 26

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
